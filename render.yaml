services:
  # Main Backend Service
  - type: web
    name: voice-agent-backend
    env: python
    buildCommand: "pip install setuptools && pip install uv && uv pip install --system -r requirements.txt"
    startCommand: "python src/ui_server.py"
    healthCheckPath: /api/config
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Background Worker (Agent)
  - type: worker
    name: voice-agent-worker
    env: python
    buildCommand: "pip install setuptools && pip install uv && uv pip install --system -r requirements.txt"
    startCommand: "python src/agent.py start"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
